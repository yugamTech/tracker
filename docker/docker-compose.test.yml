version: '3.9'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: saarthi_postgres_test
    environment:
      POSTGRES_USER: saarthi
      POSTGRES_PASSWORD: saarthi_secret
      POSTGRES_DB: saarthi_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: saarthi_redis_test
    ports:
      - "6380:6379"
