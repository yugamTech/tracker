name: CI

on:
  pull_request:
    branches: [master, main, develop]
  push:
    branches: [master, main, develop]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Blocking gate: must be green to merge ────────────────────────────────
  verify:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # postinstall runs `prisma generate` for the backend.
      - run: npm ci

      # @yaanam/types ships runtime enums consumed by the backend and resolves
      # via dist/ (gitignored), so it must be built before anything type-checks.
      - name: Build shared types
        run: npm run build --workspace=packages/types

      # Belt-and-suspenders in case the workspace postinstall was skipped.
      - name: Generate Prisma client
        run: npm run db:generate --workspace=backend/api

      - name: Type-check all workspaces
        run: npm run typecheck

      # Blocking: ESLint across every workspace (fails the job on any error).
      - name: Lint all workspaces
        run: npm run lint

      - name: Build backend
        run: npm run build --workspace=backend/api

      - name: Unit tests (backend)
        run: npm run test --workspace=backend/api

  # ── Blocking gate: backend e2e tests against real Postgres + Redis ────────
  test-backend:
    name: Backend e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saarthi
          POSTGRES_PASSWORD: saarthi_secret
          POSTGRES_DB: saarthi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://saarthi:saarthi_secret@localhost:5432/saarthi_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci_test_secret_replace_in_prod
      OTP_BYPASS_MODE: 'true'
      OTP_BYPASS_CODE: '123456'
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/types
      # Apply the committed migration history to the fresh test DB (there is no
      # db:push script; the repo uses migrations). Must run before the e2e suite,
      # which assumes the schema exists.
      - run: npm run db:migrate:prod --workspace=backend/api
      - run: npm run test:e2e --workspace=backend/api
